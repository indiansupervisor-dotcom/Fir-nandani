
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>For Nandni ❤️</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#ece5dd;display:flex;justify-content:center;align-items:center;height:100vh}
.phone{width:360px;height:700px;background:#fff;border-radius:20px;overflow:hidden;box-shadow:0 10px 30px rgba(0,0,0,.25);position:relative}
.header{background:#128C7E;color:#fff;padding:15px;font-weight:bold}
.chat{padding:12px;height:580px;overflow:auto;background:#efeae2}
.msg{background:#dcf8c6;padding:10px 12px;border-radius:10px;margin:10px 0;max-width:85%}
.center{text-align:center;padding:15px}
button{padding:10px 20px;border:none;border-radius:8px;font-size:16px;cursor:pointer}
#yes{background:#25D366;color:#fff}
#no{background:#ddd;position:absolute}
.hidden{display:none}
</style>
</head>
<body>
<div class="phone">
<div class="header">Nandni 💚<br><small>online</small></div>
<div class="chat" id="chat">
<div class="msg">Hey... 😊</div>
<div class="msg">I made something for you.</div>
<div class="msg">Don't worry... it's shorter than my letters. 😂</div>
<div class="center"><button onclick="next()">Continue ➜</button></div>
</div>
</div>
<script>
function next(){
document.getElementById('chat').innerHTML=`
<div class="msg">Remember when you were craving something sweet? 🍫</div>
<div class="msg">Remember the silly handwritten letters? ✍️</div>
<div class="msg">Remember our cute conversations? ❤️</div>
<div class="msg">They've quietly become my favorite part of the day.</div>
<div class="msg">Just one question...</div>
<div class="center">
<p><b>Can I keep making you smile? 😊</b></p>
<button id="yes" onclick="yes()">Yes ❤️</button>
<button id="no">No 🙈</button>
</div>`;
const no=document.getElementById("no");
function move(){
no.style.left=Math.random()*(280)+"px";
no.style.top=(120+Math.random()*450)+"px";
}
no.onmouseover=move;
no.onclick=move;
}
function yes(){
document.body.innerHTML=`
<div style="display:flex;justify-content:center;align-items:center;height:100vh;background:#fff0f5;text-align:center;font-family:Arial">
<div>
<h1>🥹❤️ YAAAY!</h1>
<h2>Mission Accepted</h2>
<p style="font-size:20px;line-height:1.8">
✔ Bring chocolates 🍫<br>
✔ Write silly letters 💌<br>
✔ Keep making you smile 😊<br>
❌ Use the word "official"... still pending 😜
</p>
<h3>Your chocolate is waiting for you. 🍫❤️</h3>
</div></div>`;
}
</script>
</body>
</html>
